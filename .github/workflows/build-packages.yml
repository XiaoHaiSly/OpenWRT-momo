name: build-packages

# momo 和 luci-app-momo 都是纯脚本/资源包，不含任何编译产物（Architecture: all），
# 所以不需要按 CPU 架构分别编译，每个分支编译一次即可在所有设备上安装。
# 分支本身仍然要分开编译，因为不同分支的包格式不同：
#   openwrt-24.10            -> opkg，产出 .ipk
#   openwrt-25.12 / SNAPSHOT -> apk， 产出 .apk

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build:
    name: ${{ matrix.branch }} build
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        branch:
          - openwrt-24.10
          - openwrt-25.12
          - SNAPSHOT

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-${{ matrix.branch }}
          FEEDNAME: momo
          PACKAGES: luci-app-momo
          NO_REFRESH_CHECK: true

      - name: collect packages
        run: |
          mkdir -p dist
          find bin/packages/x86_64/momo -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) \
            -exec sh -c 'cp "$1" "dist/${1##*/}"' _ {} \;

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: momo_${{ matrix.branch }}
          path: dist/*
          if-no-files-found: ignore

      - if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
        name: release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
